name: localai_app
description: AI-powered local business discovery for GCC markets.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.2

  # Navigation
  go_router: ^17.3.0

  # Local Database
  # drift pinned to <2.25.0: versions >=2.25.0 require build ^4.0.0
  # which uses 'dart compile' instead of 'dart run' to compile the build
  # script, and 'dart compile' rejects packages with native build hooks (jni).
  drift: ">=2.18.0 <2.25.0"

  # sqlite3_flutter_libs pinned to 0.5.x: version 0.6.x+ brings in jni 1.0.0
  # which declares a native build hook (hook/build.dart). This causes
  # 'dart compile' to refuse compilation of the build_runner entrypoint.
  sqlite3_flutter_libs: ^0.5.0

  path_provider: ^2.1.3
  path: ^1.9.0

  # HTTP Client
  dio: ^5.4.3
  connectivity_plus: ^7.1.1

  # Maps
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # Auth
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  flutter_secure_storage: ^10.3.1

  # Voice
  speech_to_text: ^7.4.0
  flutter_tts: ^4.0.2

  # Images
  cached_network_image: ^3.3.1

  # Location
  geolocator: ^14.0.3

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  equatable: ^2.0.5
  url_launcher: ^6.3.0
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # drift_dev pinned to <2.25.0 to match drift runtime version above.
  drift_dev: ">=2.18.0 <2.25.0"

  # build_runner pinned to <2.14.0: version 2.14.0+ pulls in build ^4.0.0
  # which switches from 'dart run' to 'dart compile' for the build entrypoint.
  build_runner: ">=2.4.9 <2.14.0"

  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/models/
