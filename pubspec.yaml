name: localai_app
description: AI-powered local business discovery for GCC markets.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.3.0

  # Local Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.3
  path: ^1.9.0

  # HTTP Client
  dio: ^5.4.3
  connectivity_plus: ^7.1.1

  # Maps
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  flutter_map_cache: ^2.1.0

  # Auth
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  flutter_secure_storage: ^10.3.1

  # Voice
  speech_to_text: ^7.4.0
  flutter_tts: ^4.0.2

  # Images
  cached_network_image: ^3.3.1

  # Location
  geolocator: ^14.0.3

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  freezed_annotation: ^3.1.0
  url_launcher: ^6.3.0
  permission_handler: ^12.0.3
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  freezed: ^3.2.3
  riverpod_generator: ^4.0.0+1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
